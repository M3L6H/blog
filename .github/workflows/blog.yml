name: blog

on:
  push:
    paths:
      - 'blog/**'
      - '.github/workflows/blog.yml'
  pull_request:
    paths:
      - 'blog/**'
      - '.github/workflows/blog.yml'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
    - name: download
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: build.yml
        name: cblog
        branch: main
        workflow_conclusion: success
        path: ./bin
    - name: set-executable
      run: chmod +x bin/cblog
    - name: run
      run: |-
        find 'blog' -type f -print0 | while IFS=read -r -d '' f; do
          cat "$f" | ./bin/cblog
        done