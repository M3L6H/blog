name: build

on:
  push:
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '3 6 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: build
      run: make
    - name: upload
      uses: actions/upload-artifact@v4
      with:
        name: cblog
        path: bin/